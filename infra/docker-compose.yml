services:
  postgres:
    image: postgis/postgis:16-3.4
    container_name: buraki-postgres
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-buraki}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-buraki}
      POSTGRES_DB: ${POSTGRES_DB:-buraki}
    ports:
      - "5432:5432"
    volumes:
      - pg_data:/var/lib/postgresql/data
      - ../infra/db/init:/docker-entrypoint-initdb.d:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $${POSTGRES_USER} -d $${POSTGRES_DB}"]
      interval: 5s
      timeout: 5s
      retries: 12

  redis:
    image: redis:7-alpine
    container_name: buraki-redis
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 12

  api:
    build: ../backend
    container_name: buraki-api
    command: >-
      sh -c "alembic upgrade head &&
      python -m app.db.seed &&
      uvicorn app.main:app --host 0.0.0.0 --port 8000"
    environment:
      DATABASE_URL: ${API_DATABASE_URL:-postgresql+psycopg://buraki:buraki@postgres:5432/buraki}
      DATA_REPOSITORY: database
      REDIS_URL: redis://redis:6379/0
      APP_SECRET_KEY: ${APP_SECRET_KEY:-change-me-in-production}
      MODEL_REGISTRY_DIR: /data/models
      SCORING_CONFIG_PATH: /ml/scoring/scoring_config.json
      SUMMARY_CSV: /data/processed/district_score_summary.csv
      MONTHLY_CSV: /data/processed/district_monthly_profile.csv
      MASTER_CSV: /data/reference/district_master.csv
      DISTRICT_GEOMETRY_PATH: /data/reference/district_boundaries.geojson
      GLOBAL_SHAP_PATH: /data/shap/global_shap_summary.json
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    ports:
      - "8000:8000"
    volumes:
      - ../data:/data:ro
      - ../ml/scoring:/ml/scoring:ro
    healthcheck:
      test:
        [
          "CMD",
          "python",
          "-c",
          "import urllib.request; urllib.request.urlopen('http://localhost:8000/api/v1/readyz')",
        ]
      interval: 10s
      timeout: 5s
      retries: 12
      start_period: 20s

  frontend:
    image: node:20-alpine
    container_name: buraki-frontend
    working_dir: /app
    command: sh -c "npm install && npm run dev"
    environment:
      NEXT_PUBLIC_API_BASE_URL: http://localhost:8000/api/v1
    depends_on:
      api:
        condition: service_healthy
    ports:
      - "3000:3000"
    volumes:
      - ../frontend:/app
      - frontend_node_modules:/app/node_modules

volumes:
  pg_data:
  frontend_node_modules:
